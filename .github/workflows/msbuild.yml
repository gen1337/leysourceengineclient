name: MSBuild

on:
  push:
  workflow_dispatch:

env:
  BUILD_CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: PreMake5
      run: .\premake5.exe vs2019

    - name: Build
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} project\leysourceengineclient.sln

    - name: Find built exe
      run: Get-ChildItem -Recurse -Filter "*.exe" | Select-Object FullName

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: leysourceengineclient
        path: |
          project\Release\*.exe
          project\x64\Release\*.exe
          build\**\*.exe
